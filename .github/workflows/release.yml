name: Release

# Build both extensions, package them into ZIPs, and attach them to a draft
# GitHub Release. Triggered by pushing a `v*` tag (e.g. `git tag v1.1.0`).
# Lives in this repo (chathub-replica) because the source and build are here.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-chrome:
    name: Build Chrome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: chathub-chrome
          path: dist/
          retention-days: 7

  build-firefox:
    name: Build Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:firefox

      - uses: actions/upload-artifact@v4
        with:
          name: chathub-firefox
          path: dist-firefox/
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

  release:
    name: Release
    needs: [build-chrome, build-firefox, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Re-hydrate the build outputs produced upstream so pack.mjs can find
      # dist/ and dist-firefox/.
      - name: Restore Chrome build
        uses: actions/download-artifact@v4
        with:
          name: chathub-chrome
          path: dist
      - name: Restore Firefox build
        uses: actions/download-artifact@v4
        with:
          name: chathub-firefox
          path: dist-firefox

      - name: Package extensions into ZIPs
        run: npm run pack:all

      - name: Create draft release and upload ZIPs
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release/chathub-replica-*.zip
